  - title: "AmslerTouch"
    id: amslertouch
    tags:
        - '# <i class="fas fa-book"></i>&nbsp; Thesis'
        - '# Web'
        - "# Svelte"
    image: amslertouch.jpg
    paper: "snuece_amslertouch_thesis.pdf"
    #code: "https://github.com/donghoon-io/AmslerTouch"
    detail: "Interactive Amsler grid web app for diagnosing Age-related Macular Degeneration (B.S. Thesis)"
    description: |
        <p>Due to the irreversible characteristics and disastrous effects of Age-related Macular Degeneration (AMD), a precise diagnosis of the symptoms is extremely important. Yet, paper-based Amsler Grid, the most prevalent testing method, is highly limited in that it requires the indirect report of patients and quantitative reporting is difficult.<br><br></p>
        <p>Working with prof. Jongmo Seo (SNU Hospital, SNU ECE), I designed and developed a touch-based Amsler grid web app. As such, I aimed to support patients' exact report of their regions of symptoms.<br><br></p>
        <p>What made this project special to me is that, I made a LaTeX template for writing this paper! I found that my friends preparing for their thesis always felt it difficult to produce a thesis format, since our department only gave us a 'scanned' version of template, not a real document. Thus, I generated a template which can be found <a href="https://github.com/donghoon-io/SNUECE-BS-thesis">here</a> (this template was built upon previous Ph.D. dissertation template under license)<br><br></p>
        <p>This study was conducted for my B.S. thesis.</p>
        <img src="site.baseurl/assets/images/projects_detail/amslertouch.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreen of AmslerTouch</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>Independent project</p>
  - title: "LiquidEye"
    id: liquideye
    tags:
        - "# Research"
        - '# <i class="fas fa-book"></i>&nbsp; Published'
        - "# MacOS"
    image: liquideye.jpg
    paper: "jmir_liquideye_paper.pdf"
    code: "https://github.com/donghoon-io/LiquidEye"
    detail: "Exploring design space of Computer Vision Symdrome (CVS) intervention application"
    description: |
        <p>Prolonged time of computer use increased the prevalence of ocular problems including eyestrain, tired eyes, irritation, redness, blurred vision, and double vision, collectively referred to as computer vision syndrome. In this study, we aim to explore the interface elements of computer-based intervention for computer vision syndrome to set design guidelines based on pros/cons of each interface element.<br><br></p>
        <p>In this project, I developed LiquidEye: an intervention application targeted to MacOS. In order to understand which design elements of intervention app do users prefer, we made the system to collect each user's time-series system preferences. We later jointly analyzed them with the self-reported satisfaction in order to identify the significance of each element statistically.<br><br></p>
        <p>This work was later published in <b>Journal of Medical Internet Research</b> (IF = 5.03).</p>
        <img src="site.baseurl/assets/images/projects_detail/liquideye.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreen of LiquidEye</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>System development, running interview sessions, writing</p>
  - title: "BlahBlahBot"
    id: blahblahbot
    image: blahblahbot.jpg
    paper: "chi2021_blahblahbot_poster.pdf"
    video: https://youtu.be/6UQi9gCgMjU
    code: "https://github.com/donghoon-io/BlahBlahBot"
    detail: "Facilitating conversation between strangers using a chatbot with ML-infused personalized topic suggestion"
    tags:
        - "# Research"
        - '# <i class="fas fa-book"></i>&nbsp; Published'
        - "# AI-MC"
        - "# iOS"
    description: |
        <p>It is a prevalent behavior of having a chat with strangers in online settings where people can easily gather. Yet, people often find it difficult to initiate and maintain conversation due to the lack of information about strangers.<br><br></p>
        <p>Hence, we aimed to facilitate conversation between the strangers with the use of machine learning (ML) algorithms and present BlahBlahBot, an ML-infused chatbot that moderates conversation between strangers with personalized topics. Based on social media posts, BlahBlahBot supports the conversation by suggesting topics that are likely to be of mutual interest between users.<br><br></p>
        <p>A user study with three groups (control, random topic chatbot, and BlahBlahBot; N=18) found the feasibility of BlahBlahBot in increasing both conversation quality and closeness to the partner, along with the factors that led to such increases from the user interview. Overall, our preliminary results imply that an ML-infused conversational agent can be effective for augmenting a dyadic conversation.<br><br></p>
        <p>This work was published in <b>CHI 2021</b> (Late-Breaking Work).<br><br></p>
        <img src="site.baseurl/assets/images/projects_detail/blahblahbot.jpg" class="img-responsive" style="max-width: none !important;">
        <p style="text-align: center; font-size: 14px;"><b>Framework of BlahBlahBot</b><br><br></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>System development, running interview sessions, writing</p>
  - title: "Easier Said than Done"
    id: fall2020instell
    image: fall2020instell.jpg
    detail: "iOS-based serious game app submitted to Fall 2020 Interactive Storytelling course"
    appstore: "https://apps.apple.com/app/id1542957206"
    code: "https://github.com/donghoon-io/Easier-said-than-done"
    tags:
        - "# Schoolwork"
        - "# Serious game"
        - "# iOS"
    description: |
        <p>According to a recent survey conducted by American Psychological Association [1], academic stress is cited as the number one stressor in students' daily life. This issue is specifically considered serious in South Korea, where half of Korean teenagers experienced a thought of suicidal and academic stress is reported as a top-ranked attribute to such phenomenon [2].<br><br></p>
        <p>This, however, cannot be solely dealt with reducing academic affair. Since such academic phenomenon is multi-faceted with lots of stakeholders involved (e.g., homeroom teacher, parents, and friends), we should not naïvely understand the issue. For example, high schools often focus on increasing the number of students entering so-called 'prestigious universities.' However, by solely focusing on the name of university rather than a major, this often undermines the agency of students' decision on their future career, and leading students to suffer from subsidious academic stresses as well as a stress on the study itself.<br><br></p>
        <p>Since the academic curriculum drastically changes over time and policy-makers and relatively older people cannot easily understand such a situation, we aimed to show how difficult it is for high school students to 'survive' under such factors that often lead to academic stresses. By having users choose a choice in each crossroad of choices and differentiating the following storieline, we, though indirectly, let them feel how stressed high school students would be in the midst of a choice.<br><br></p>
        <img src="site.baseurl/assets/images/projects_detail/fall2020instell.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreens of Easier said than done</b><br><br></p>
        <p><b>REFERENCE</b><br>[1] American Psychological Association. (2014). Stress in America: Are teens adopting adults’ stress habits. Washington, DC: Author.<br>[2] Kang, Y. (2014). Poll shows half of Korean teenagers have suicidal thoughts. The Wall Street Journal.</p>
        <hr>
        <p><b>[What I've done in this project]</b><br>System development</p>
  - title: "夜-planet"
    id: fall2020ucd
    image: fall2020ucd.jpg
    detail: "Design homework submitted to Fall 2020 User-Centered Design course"
    link: "https://www.notion.so/6e350a9141b44a3ab9886b6e443547d1"
    tags:
        - "# Schoolwork"
        - "# Design"
        - "# Prototype"
    description: |
        <p>In this project, we designed an application for supporting those who study abroad, but came back due to COVID-19. Since they often suffer from lack of sleep due to the time difference, we aimed to support them with managing their health, at the same time not undermining their classworks. In order to precisely understand their needs, we conducted extensive user interview sessions, YouTube v-logger observation study, diary study, and web survey.<br><br></p>
        <p>As a result, we designed '夜-planet', an application that supports students under such circumstances. '夜' is a Chinese character for 'night', and '夜-planet' stands for 'nocturnal.'<br><br></p>
        <p>If you are interested in taking a look at our prototype, please check out the link above:) (Korean)</p>
