  - title: "MOOC analysis"
    id: kmooc
    tags:
        - "# Research"
        - "# Data-analysis"
        - "# Ongoing"
    image: kmooc.jpg
    detail: "Understanding how older adults use online videos for learning"
    description: |
        <p>In this project, we aim to understand how older adults use online videos for learning. To better understand the online learning of older adults, we adopted a mixed-method approach: (1) analyzing 41.8M logs extracted from K-MOOC, a Korean MOOC (Massive Open Online Course) platform and (2) running in-depth interview sessions with older adults.<br><br></p>
        <p>Led by <a href="https://sites.google.com/view/seoyoung/">Seoyoung Kim</a>, this project is being advised by <a href="https://juhokim.com/">Juho Kim</a>.</p>
        <img src="site.baseurl/assets/images/projects_detail/kmooc.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Distribution of K-MOOC users by age</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>Running interview sessions, open-coding responses, analyzing log data, writing</p>
  - title: "LOVEGORITHM"
    id: lovegorithm
    tags:
        - '# Coursework'
        - '# Web'
        - '# Speculative design'
    image: lovegorithm.jpg
    detail: "What if a chatbot hides behind a person in a romantic relationship and fully manages dialogues?"
    link: "https://donghoon.io/spring2021crp/"
    description: |
        <p>Have you ever wished a robot to send romantic messages to the other on behalf of yourself? Having a conversation in a romantic relationship is often difficult. Sometimes we ask our friends for help, but such help is limited.<br><br></p>
        <p>In this project, we assumed that an AI agent in chat settings became so smart that it perfectly analyzes the counterpart's emotion and suggests responses in a chat setting. Along with a prototype app LOVEGORITHM that helps such a romantic relationship, we designed and developed an LOVEGORITHM online user community that illustrates possible feedback and behaviors of users. Check out the link above!<br><br></p>
        <p>This work was submitted as a team project assignment to the Spring 2021 Creative Research Practice course.</p>
        <img src="site.baseurl/assets/images/projects_detail/lovegorithm-1.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreens of LOVEGORITHM</b></p>
        <img src="site.baseurl/assets/images/projects_detail/lovegorithm-2.png" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreen of LOVEGORITHM online user community</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>Web development, prototype design, setting up dialogues, ideation</p>
