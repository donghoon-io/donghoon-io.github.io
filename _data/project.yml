  - title: "Collaborative DBT App"
    id: dbt
    tags:
        - '# Research'
        - '# Ongoing'
        - '# mHealth'
    image: dbt.jpg
    detail: "Designing a Collaborative Mobile DBT Application for Managing Daily Anxiety"
    description: |
        <p>Dialectical Behavioral Therapy (DBT) is known to be effective in managing various types of anxiety.
        In this project, we aim to design a collaborative mobile DBT app for augmenting user engagement, practice, and implementation.<br><br></p>
