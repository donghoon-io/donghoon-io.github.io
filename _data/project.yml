  - title: "Digital Ethnography"
    id: digitalethnography
    paper: "spring2020_digital-ethnography_report.pdf"
    tags:
        - "# Schoolwork"
        - '# Research'
        - "# Micro-mobility"
    image: mobility.jpg
    detail: "Term paper on needfinding of Korean micro-mobility users submitted to Spring 2020 Digital Ethnography course (written in Korean)"
    description: |
        <p>I've been working as an iOS developer in a local micro-mobility sharing startup for about 2 years. As working in a tech company, I got to know
        that understanding possible users is extremely important for the success of service and business.<br><br></p>
        <p>Thus, I decided to take 'Digital Ethnography' class, where students choose one topic they want to deal with and explore user groups to better
        understand the topic. With the topic of <b>understanding why users hesitate riding a sharing mobility device and discuss solutions using ethnography</b>,
        I ran a couple of observation and interview studies with college students (N=6).<br><br></p>
        <p>Even though I could run the user observation study neither for a long term nor with a large number (COVID-19),
        it was really interesting to understand how HCI researchers explore users with qualitative methodologies in the real-world context.<br><br></p>
        <p>Please kindly understand that the paper was written in Korean language.</p>
        <img src="site.baseurl/assets/images/projects_detail/mobility.jpg" class="img-responsive">
        <hr>
        <p><b>[What I've done in this project]</b><br>Independent project</p>
  - title: "PRP"
    id: prp
    paper: "mobilehci2020_prp_poster.pdf"
    tags:
        - "# Research"
        - '# <i class="fas fa-book"></i>&nbsp; Published'
        - "# KakaoTalk"
    image: prp.jpg
    detail: "Understanding which linguistic features contribute to forming a persona of a chatbot"
    description: |
        <p>Although text-based conversational agents (chatbots) have a great potential of journaling diets and managing one's
        health, it is suffering from the low acceptance of users. To overcome this, we proposed an idea of <b>applying the persona of real world caregivers into the chatbot</b>.<br><br></p>
        <p>Led by <a href="https://youjin-h.github.io">Youjin Hwang</a>, we conducted a series of studies regarding this topic. Specifically, in this study, we
        aimed to <b>identify several important linguistic features that make users perceive a chatbot as a real person</b>.<br><br></p>
        <p>This study was later polished and published in <b>MobileHCI 2020</b> (Late-Breaking Result).</p>
        <img src="site.baseurl/assets/images/projects_detail/prp.jpg" class="img-responsive">
        <hr>
        <p><b>[What I've done in this project]</b><br>Writing</p>
  - title: "PersonaBot"
    id: personabot
    paper: "chi2020_personabot_workshop.pdf"
    tags:
        - "# Research"
        - '# <i class="fas fa-book"></i>&nbsp; Published'
        - "# KakaoTalk"
    image: personabot.jpg
    detail: "Applying the persona of user's caregivers to health-managing chatbots"
    description: |
        <p>Although text-based conversational agents (chatbots) have a great potential of journaling diets and managing one's
        health, it is suffering from the low acceptance of users. To overcome this, we proposed an idea of <b>applying the persona of real world caregivers into the chatbot</b>.<br><br></p>
        <p>Led by <a href="https://youjin-h.github.io">Youjin Hwang</a>, we conducted a series of studies regarding this topic. Specifically, in this study, we
        aimed to <b>compare user perception on personas (doctor, family member, and w/o persona) applied to a chatbot</b>. Although this work is done with
        Wizard-of-Oz methodology, we expect that the findings would be extensible to automated cases with ML.<br><br></p>
        <p>This study was later polished and published in <b>CHI 2020 Workshop on Conversational Agents for Health and Wellbeing</b>.</p>
        <img src="site.baseurl/assets/images/projects_detail/personabot.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Three personas applied to a chatbot</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>System development, running experiment, writing</p>
  - title: "Juvis J Bot"
    id: juvis
    link: "http://www.juvis.co.kr"
    tags:
        - "# Commercial"
        - "# KakaoTalk"
    image: juvis.jpg
    detail: "A chatbot agent for offering a health information & inducing an enrollment of Juvis, a Korean diet managing company"
    description: |
        <p>Juvis is a Korean diet-managing company. In order to give enough information and lead users to successfully book a reservation,
        we designed a chatbot. This experience led me to learn how we might design a chatbot, and this helped me to design a chatbot in my
        another project about <b>applying the persona on a chatbot</b>.</p>
