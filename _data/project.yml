  - title: "TalkingBoogie"
    id: talkingboogie
    paper: "chi2020_talkingboogie_paper.pdf"
    slide: "chi2020_talkingboogie_slide.pdf"
    appstore: "https://apps.apple.com/app/id1435744898"
    code: "https://github.com/donghoon-io/TalkingBoogie"
    tags:
        - "# Research"
        - '# <i class="fas fa-book"></i>&nbsp; Published'
        - '# <i class="fas fa-medal"></i>&nbsp; Awarded'
        - "# iOS"
    image: talkingboogie.jpg
    detail: "Collaborative mobile AAC system for non-verbal children with developmental disabilities and their caregivers"
    description: |
        <p>At the end of my sophomore year, I read one CHI paper by chance: <b>"Blocks4All: overcoming accessibility barriers to
            blocks programming for children with visual impairments."</b> Written by Milne and her colleagues, this paper
            explores the methods of overcoming accessibility issues in existing block-based programming tools. I was super
            intrigued by how HCI researchers try to understand user groups and reflect design implications into an artifact.<br><br></p>
        <p>Surprisingly, at that moment my supervisor asked if I'm willing to lead a project for developing an AAC (Augmentative and Alternative Communication) application.
            Definitely I said yes, because I found it really difficult to take part in any research project as an undergrad without any
            previous research experience then. From then, I spent almost every night developing an iOS app, while simultaneously conducting
            user studies, reading relevant papers, and even designing! Literally everything was new: from being funded for a research to getting an
            approval from IRB for the evaluation! Fortunately, at the moment when I finished my research, we were almost at the deadline
            of <b>CHI 2020</b> and submitted our work there, and got accepted with an <b>Honorable Mention Award</b>.<br><br></p>
        <p>To summarize our paper briefly, we tried not to restrict a stakeholder of AAC to only a child, but also viewed their caregivers
            very important in the process of child's communication. Based on this research context, we aimed to develop a system that helps them collaborate to
            drive the best strategies on child's communication. As a result, we developed <b>Talkingboogie, a mobile AAC system for children
            with developmental disabilities</b>.</p>
        <img src="site.baseurl/assets/images/projects_detail/talkingboogie-1.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Usage flow of TalkingBoogie system</b><br><br></p>
        <p>TalkingBoogie system consists of two mobile apps: <b>TalkingBoogie-AAC</b> for caregiver-child communication, and
            <b>TalkingBoogie-Coach</b> supporting caregiver collaboration.</p>
        <img src="site.baseurl/assets/images/projects_detail/talkingboogie-2.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreens of TalkingBoogie-AAC</b></p>
        <img src="site.baseurl/assets/images/projects_detail/talkingboogie-3.jpg" class="img-responsive">
        <p style="text-align: center; font-size: 14px;"><b>Keyscreens of TalkingBoogie-Coach</b></p>
        <hr>
        <p><b>[What I've done in this project]</b><br>System development, writing, user study, running interview sessions, data analysis</p>
  - title: "Music Knows."
    id: dt4c_p3
    image: dt4c_p3.jpg
    detail: "What my favorite sets of music tell about my emotion"
    tags:
        - "# Schoolwork"
        - "# InfoVis"
        - "# D3.js"
    description: |
        <p>I believe that one's favourite set of music in a specific period represents own emotion at that period. To prove this, I listed all my favourite songs by each semester. Then, I analyzed the emotion of each song using <a href="https://cyanite.ai">Cyanite</a>, and I visualized the results with <a href="https://d3js.org">D3.js</a>.<br><br></p>
        <p>Well, I was super shocked by the result. For my depressing time, I used to listen to melancholic songs. For my highest period, my playlist was full of happy and energetic songs. Why don't you try with your own playlist?<br><br></p>
        <p>This design work was submitted as an assignment to Spring 2020 Design Thinking for Communication course.</p>
        <img src="site.baseurl/assets/images/projects_detail/P3.jpg" class="img-responsive">
        <hr>
        <p><b>[What I've done in this project]</b><br>Independent project</p>
  - title: 'COVID-19, the Infodemics'
    id: dt4c_p2
    image: dt4c_p2.jpg
    detail: "How misinformation and disinformation are spread and exacerbate COVID-19"
    tags:
        - "# Schoolwork"
        - "# Infographics"
        - "# Illustrator"
    description: |
        <p>I personally don't prefer to believe things that haven't been proved yet. But some posts in social networking services make people believe fake or unproven news to be correct, and some even try to convey these for their adversarial purposes!<br><br></p>
        <p>In this project, I aimed to provide examples of some 'controversial' information that emerged during the COVID-19 situation. Then, I tried to let readers decide. Well, this was a tough project because COVID-19 was a 'relatively new' phenomenon then and it lacked relevant information. However, I'm pretty fascinated with how 'seemingly ridiculous' information is spread throughout people and later considered to be true.<br><br></p>
        <p>This design work was submitted as an assignment to Spring 2020 Design Thinking for Communication course.</p>
        <img src="site.baseurl/assets/images/projects_detail/P2.jpg" class="img-responsive">
        <hr>
        <p><b>[What I've done in this project]</b><br>Independent project</p>
