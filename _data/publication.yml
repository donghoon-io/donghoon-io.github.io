      - title: "Applying the Persona of User's Family Member and the Doctor to the Conversational Agents for Healthcare"
        author: Youjin Hwang, <intext-highlight>Donghoon Shin</intext-highlight>, Sion Baek, Bongwon Suh, Joonhwan Lee
        venue: <intext-highlight>CHI 2020 Workshop.</intext-highlight> (Conversational Agents for Health and Wellbeing)
        pdf: chi2020_personabot_workshop.pdf
        id: personabot
        tags:
          - 'Healthcare'
          - 'Chatbot'
          - 'Personality attribution'
        abstract:
          Conversational agents have been showing lots of opportunities in
          healthcare by taking over a lot of tasks that used to be done by a
          human. One of the major functions of conversational healthcare agent is
          intervening users' daily behaviors. In this case, forming an intonate
          and trustful relationship with users is one of the major issues. Factors
          affecting human-agent relationship should be deeply explored to improve
          long-term acceptance of healthcare agent. Even though a bunch of ideas
          and researches have been suggested to increase the acceptance of
          conversational agents in healthcare, challenges still remain. From the
          preliminary work we conducted, we suggest an idea of applying the
          personas of users' family members and the doctor who are in the
          relationship with users in the real world as a solution for forming the
          relict relationship between humans and the chatbot.
        bibtex: |
          @inproceedings{chatbotpersona,</br>
                                                <span class="tab">&#9;</span>author = {Hwang, Youjin and Shin, Donghoon
                                                and Baek, Sion and Suh, Bongwon and Lee, Joonhwan},</br>
                                                <span class="tab">&#9;</span>title = {Applying the Persona of User’s
                                                Family Member and the Doctor to the Conversational Agents for
                                                Healthcare},</br>
                                                <span class="tab">&#9;</span>booktitle = {CHI 2020 Workshop on
                                                Conversational Agents for Health and Wellbeing},</br>
                                                <span class="tab">&#9;</span>year = {2020},</br>
                                                <span class="tab">&#9;</span>location = {Honolulu, HI, USA},</br>
                                                <span class="tab">&#9;</span>keywords = {chatbot, persona,
                                                healthcare}</br>
                                                }
