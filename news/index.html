---
layout: default
permalink: /news
title: News
description: Recent news of Donghoon Shin
---

{% assign news = site.data.news.list %}

<div class="px-3 py-4">
    <p class="section-title">News</p>
    <div class="mt-4 grid grid-cols-1 gap-x-6 gap-y-4 sm:grid-cols-2">
        {% for new in news %}
        <div>
            <p class="news-title mb-0">{{ new.title }}</p>
            <p class="news-date mb-1">{{ new.date | date: "%b %-d, %Y" }}</p>
            <p class="news-description">{{ new.description }}</p>
            <hr>
        </div>
        {% endfor %}
    </div>
</div>
